name: Collaborative Sync Server CI

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Run Linting
        run: npm run lint

      # 🚀 PERFORMANCE GATE: Spin up server in background
      - name: Start Server in Background
        run: |
          npm run build
          node dist/server.js &
        env:
          NODE_ENV: test
          PORT: 8080
          # Pass any transient environment variables your server needs to boot cleanly

      # Wait for the network port to open before kicking off the load test
      - name: Wait for Server Response
        run: npx wait-on http://127.0.0.1:8080 || sleep 3

      # Pull down official k6 runner and run the regression headless script
      - name: Run k6 Load Test Gate
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js
          flags: --quiet