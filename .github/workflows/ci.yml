name: Collaborative Sync Server CI

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Run Linting
        run: npm run lint

      # 🧪 RUN FULL TEST SUITE
      - name: Run Test Suite
        run: npm test
        env:
          NODE_ENV: test
          REDIS_URL: "redis://localhost:6379"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET_TOKEN: ${{ secrets.AUTH_SECRET_TOKEN }}
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAPHITE_USER_ID_ENV: ${{ secrets.GRAPHITE_USER_ID_ENV }}

      # 🚀 START SERVER FOR PERFORMANCE GATE
      - name: Start Server in Background
        run: |
          npx tsx server.ts > server.log 2>&1 &
        env:
          NODE_ENV: test
          PORT: 8080
          REDIS_URL: "redis://localhost:6379"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET_TOKEN: ${{ secrets.AUTH_SECRET_TOKEN }}
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAPHITE_USER_ID_ENV: ${{ secrets.GRAPHITE_USER_ID_ENV }}

      # 🔍 NETWORKING GATE
      - name: Wait for Server Response
        run: |
          npx wait-on tcp:127.0.0.1:8080 --timeout 30000 || (echo "=== SERVER CRASH LOGS ===" && cat server.log && exit 1)

      # 📊 INSTALL k6 NATIVELY
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      # 📊 PERFORMANCE REGRESSION GATE
      - name: Run k6 Load Test Gate
        run: k6 run --quiet load-test.js
        env:
          K6_WS_URL: ws://127.0.0.1:8080
          AUTH_SECRET_TOKEN: ${{ secrets.AUTH_SECRET_TOKEN }}

      # 🐳 CONTAINER VERIFICATION GATE
      - name: Verify Container Build Matrix
        run: |
          docker build -t collaborative-sync-server:test .