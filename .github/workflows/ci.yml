name: Collaborative Sync Server CI

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    # 🔗 Spin up a real, isolated Redis container for the pipeline duration
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Run Linting
        run: npm run lint

      # 🚀 PERFORMANCE GATE: Spin up server pointing to the native runner services
      - name: Start Server in Background
        run: |
          npm run build
          node dist/server.js &
        env:
          NODE_ENV: test
          PORT: 8080
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          REDIS_URL: "redis://localhost:6379" # Connects directly to the service container above

      # 🔍 NETWORKING GATE: Wait up to 30s for raw TCP socket binding
      - name: Wait for Server Response
        run: npx wait-on tcp:127.0.0.1:8080 --timeout 30000

      # 📊 PERFORMANCE REGRESSION GATE: Execute headless k6 test run
      - name: Run k6 Load Test Gate
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js
          flags: --quiet

      # 🐳 CONTAINER VERIFICATION GATE (Add this block back when your Dockerfile is ready)
      # - name: Verify Container Build Matrix
      #   run: |
      #     docker build -t collaborative-sync-server:test .