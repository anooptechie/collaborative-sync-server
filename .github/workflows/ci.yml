name: Collaborative Sync Server CI 

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  verify-build:
    name: Type Check and Lint
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down the source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up the exact Node.js runtime matching our stack
      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm' # Automatically caches node_modules boundaries for rapid execution

      # 3. Clean install deterministic dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Enforce code style and defensive structures
      - name: Run Linter
        run: npm run lint
        continue-on-error: false

      # 5. Native TypeScript validation (Catching implicit anys and type mismatches)
      - name: Run TypeScript Compiler (Type Check)
        run: npx tsc --noEmit