name: Collaborative Sync Server CI

on:
  push:
    branches: [ main, "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Type Check
        run: npx tsc --noEmit

      - name: Run Linting
        run: npm run lint

      # 🧪 RUN FULL TEST SUITE
      - name: Run Test Suite
        run: npm test
        env:
          NODE_ENV: test
          REDIS_URL: "redis://localhost:6379"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET_TOKEN: ${{ secrets.AUTH_SECRET_TOKEN }}
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAPHITE_USER_ID_ENV: ${{ secrets.GRAPHITE_USER_ID_ENV }}

      # 🚀 START SERVER FOR PERFORMANCE GATE
      - name: Start Server in Background
        run: |
          npx tsx server.ts > server.log 2>&1 &
        env:
          NODE_ENV: test
          PORT: 8080
          REDIS_URL: "redis://localhost:6379"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET_TOKEN: ${{ secrets.AUTH_SECRET_TOKEN }}
          GRAFANA_API_TOKEN: ${{ secrets.GRAFANA_API_TOKEN }}
          GRAPHITE_USER_ID_ENV: ${{ secrets.GRAPHITE_USER_ID_ENV }}

      # 🔍 NETWORKING GATE
      - name: Wait for Server Response
        run: |
          npx wait-on tcp:127.0.0.1:8080 --timeout 30000 || (echo "=== SERVER CRASH LOGS ===" && cat server.log && exit 1)

      # 📊 PERFORMANCE REGRESSION GATE
      - name: Run k6 Load Test Gate
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js
          flags: --quiet
        env:
          K6_WS_URL: ws://host.docker.internal:8080
          AUTH_SECRET_TOKEN: ${{ secrets.AUTH_SECRET_TOKEN }}

      # 🐳 CONTAINER VERIFICATION GATE
      - name: Verify Container Build Matrix
        run: |
          docker build -t collaborative-sync-server:test .